# Example luxctl configuration.
#
# Copy to ~/.config/luxctl/config.toml and edit. Every section is
# optional; missing keys fall back to the defaults shown here.

[daemon]
# How often the daemon polls all sources and re-resolves state.
# Lower = more responsive, but more API calls (Slack rate-limits at
# ~50/min on tier-3, so don't drop poll_seconds below 2 unless you
# also bump [slack].poll_seconds).
tick_seconds = 5

# --- Sources ------------------------------------------------------------

[idle]
# Declares "brb" after `away_minutes` of input idleness, "offline" after
# `offline_minutes`. Works on Wayland (gdbus → Mutter) and X11 (xprintidle).
enabled = true
away_minutes = 5
offline_minutes = 30

[lock]
# Declares "offline" while your screen is locked (logind LockedHint).
enabled = true

[calendar]
# Declares "meeting" during any active iCal event.
# Get the URL from Google Calendar → Settings → "Secret address in iCal
# format", or from your work calendar's published feed.
enabled = false
url = "https://calendar.google.com/calendar/ical/REPLACE_ME/basic.ics"
cache_seconds = 60

[slack]
# Reads your Slack presence (active/away) AND writes your Slack profile
# (status text + emoji + DND). Token lives in secrets.toml - run:
#   luxctl slack setup
enabled = false
poll_seconds = 30
# Statuses for which the daemon should also engage Slack DND. The DND is
# released the moment you flip away from these statuses.
set_dnd_for = ["stressed", "dnd", "on-fire"]

# Override the default emoji for any preset. Anything not listed here
# uses luxctl/sinks/slack.py:DEFAULT_EMOJI_MAP.
[slack.emoji_map]
busy = ":lock:"
meeting = ":calendar:"
"deep-work" = ":headphones:"

# --- Custom presets -----------------------------------------------------
#
# Add as many [presets.<name>] blocks as you like. Each one becomes a
# selectable status (`luxctl status <name>`) and shows up in the tray
# menu and stats. Re-using a built-in name (busy, meeting, ...) overrides
# the built-in.
#
# Supported keys per preset:
#   static  = [r, g, b]          solid colour
#   fade    = [r, g, b]          fade to colour
#   strobe  = [r, g, b]          strobing
#   wave    = [r, g, b]          wave animation
#   pattern = N (1-8)            built-in firmware pattern (5 = police siren)
# Modifiers (where applicable):
#   speed = N    repeat = N    wave_type = N (1-5)
# Plus an optional `description = "..."` shown in `luxctl list`.

# [presets.coding]
# static = [50, 200, 50]
# description = "Solid green-ish, hands on the keyboard."

# [presets.urgent]
# strobe = [255, 0, 0]
# speed = 5
# repeat = 30

# [presets.afk-but-online]
# fade = [80, 80, 80]
# speed = 60
# description = "Faint grey pulse."
